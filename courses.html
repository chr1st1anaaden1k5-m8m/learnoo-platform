<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learno - My Courses</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f8fafc;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #10b981, #059669) !important;
      }
      .course-card {
        transition: all 0.3s;
      }
      .course-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">🌱 Learno</a>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm"
          >Back to Dashboard</a
        >
      </div>
    </nav>

    <div class="container mt-5" style="margin-top: 100px">
      <h2 class="mb-2">My Courses</h2>
      <p class="text-muted mb-5">
        Choose a course and continue your adaptive learning journey
      </p>

      <div class="row" id="coursesContainer"></div>
    </div>

    <script>
      const courses = [
        {
          title: "Database Systems",
          emoji: "💾",
          progress: "Lesson 3 of 10",
          status: "In Progress",
          buttonText: "Continue Learning",
          link: "learning.html",
        },
        {
          title: "Cybersecurity for Beginners",
          emoji: "🔒",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Introduction to Cloud Computing",
          emoji: "☁️",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Excel from Beginner to Professional",
          emoji: "📊",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Web Development Basics",
          emoji: "🌐",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Python Programming",
          emoji: "🐍",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Digital Marketing",
          emoji: "📱",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
        {
          title: "Data Analysis Fundamentals",
          emoji: "📈",
          progress: "Not Started",
          status: "Available",
          buttonText: "Start Course",
          link: "#",
        },
      ];

      const container = document.getElementById("coursesContainer");
      courses.forEach((course) => {
        const card = `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card course-card h-100">
            <div class="card-body">
              <h4>${course.emoji} ${course.title}</h4>
              <p class="text-success">${course.progress}</p>
              <button class="btn btn-success w-100" onclick="window.location.href='${course.link}'">
                ${course.buttonText}
              </button>
            </div>
          </div>
        </div>
      `;
        container.innerHTML += card;
      });
    </script>
  </body>
</html>
