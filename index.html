<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learno - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <!-- Header -->
        <div class="header">
          <h1>Learno</h1>
          <p>Sentiment Aware Learning Platform</p>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue your learning journey</p>

        <form id="loginForm">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="student@learno.com"
              required
            />
            <span class="error" id="emailError"></span>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
              />
              <button type="button" id="togglePassword" class="toggle-btn">
                👁️
              </button>
            </div>
            <span class="error" id="passwordError"></span>
          </div>

          <div class="options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              Remember me
            </label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>

          <button type="submit" id="loginBtn">Sign In</button>
        </form>

        <p class="signup">New to Learno? <a href="register.html">Create an account</a></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
